<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>AR&#12376;&#12419;&#12435;&#12369;&#12435;</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <video id="cameraVideo" class="camera" autoplay muted playsinline></video>
    <canvas id="actorCanvas" class="actor-canvas" aria-hidden="true"></canvas>
    <video id="actorVideo" class="source-video" preload="auto" playsinline webkit-playsinline></video>

    <main class="hud">
      <section class="status-panel" aria-live="polite">
        <p id="stateText" class="state-text">&#12473;&#12479;&#12540;&#12488;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</p>
        <p id="handsText" class="hands-text">&#12354;&#12394;&#12383;: - / &#30456;&#25163;: -</p>
        <p id="streakText" class="streak-text">&#36899;&#21213;: 0</p>
        <p id="missingText" class="missing-text" hidden></p>
      </section>

      <section class="controls" aria-label="&#12376;&#12419;&#12435;&#12369;&#12435;&#12398;&#25163;">
        <button id="roundButton" class="round-button" type="button" disabled>&#12376;&#12419;&#12435;&#12369;&#12435;</button>
        <button class="hand-button" type="button" data-hand="rock" aria-label="&#12464;&#12540;" disabled hidden>
          <img class="hand-icon" src="assets/images/hand-rock.png" alt="">
        </button>
        <button class="hand-button" type="button" data-hand="scissors" aria-label="&#12481;&#12519;&#12461;" disabled hidden>
          <img class="hand-icon" src="assets/images/hand-scissors.png" alt="">
        </button>
        <button class="hand-button" type="button" data-hand="paper" aria-label="&#12497;&#12540;" disabled hidden>
          <img class="hand-icon" src="assets/images/hand-paper.png" alt="">
        </button>
      </section>
    </main>

    <button id="skipButton" class="skip-button" type="button" hidden>skip</button>

    <section id="previewPanel" class="preview-panel" hidden>
      <select id="previewSelect" class="preview-select" aria-label="&#30906;&#35469;&#29992;&#21205;&#30011;"></select>
      <div class="preview-range">
        <label class="preview-label">
          <span>&#36215;&#28857;</span>
          <select id="previewStartSelect" class="preview-select" aria-label="&#36899;&#32154;&#20877;&#29983;&#12398;&#36215;&#28857;"></select>
        </label>
        <label class="preview-label">
          <span>&#32066;&#28857;</span>
          <select id="previewEndSelect" class="preview-select" aria-label="&#36899;&#32154;&#20877;&#29983;&#12398;&#32066;&#28857;"></select>
        </label>
      </div>
      <div class="preview-actions">
        <button id="previewPlayButton" class="preview-button" type="button">&#20877;&#29983;</button>
        <button id="previewRangeButton" class="preview-button" type="button">&#36899;&#32154;</button>
        <button id="previewStopButton" class="preview-button" type="button">&#12473;&#12488;&#12483;&#12503;</button>
        <button id="previewSlowButton" class="preview-button" type="button">&#12473;&#12525;&#12540;</button>
        <button id="previewFastButton" class="preview-button" type="button">&#20493;&#36895;</button>
        <button id="previewTopButton" class="preview-button" type="button">&#12488;&#12483;&#12503;&#12408;</button>
      </div>
    </section>

    <div id="startOverlay" class="start-overlay">
      <section class="opponent-select" aria-label="&#23550;&#25126;&#30456;&#25163;">
        <p class="opponent-title">&#23550;&#25126;&#30456;&#25163;</p>
        <div class="opponent-options">
          <button class="opponent-button is-selected" type="button" data-opponent="default">&#30456;&#25163; A</button>
          <button class="opponent-button" type="button" data-opponent="speed">&#30456;&#25163; B</button>
          <button class="opponent-button" type="button" data-opponent="boss">&#30456;&#25163; C</button>
        </div>
      </section>
      <button id="startButton" class="start-button" type="button">&#12473;&#12479;&#12540;&#12488;</button>
      <p id="startHint" class="start-hint">&#32972;&#38754;&#12459;&#12513;&#12521;&#12392;&#20154;&#29289;&#21205;&#30011;&#12434;&#38283;&#22987;&#12375;&#12414;&#12377;</p>
      <button id="previewModeButton" class="preview-entry-button" type="button">&#21205;&#30011;&#30906;&#35469;</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
